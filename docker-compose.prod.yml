version: '3.8'

services:
  app:
    image: lahbabi-guide:latest
    restart: always
    ports:
      - "3000:3000"
    env_file: .env.production
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network

networks:
  app_network:

volumes:
  pgdata:
